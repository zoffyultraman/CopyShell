name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  SOLUTION: CopyShell.sln
  CONFIGURATION: Release
  PLATFORM: x64
  RUNTIME_IDENTIFIER: win-x64
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  release:
    name: Sign and publish Windows x64
    runs-on: windows-2022
    timeout-minutes: 40
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release inputs
        id: version
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.COPYSHELL_SIGNING_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.COPYSHELL_SIGNING_CERT_PASSWORD }}
          CERTIFICATE_PUBLISHER: ${{ secrets.COPYSHELL_CERT_PUBLISHER }}
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
            throw "发布标签必须采用 v主版本.次版本.修订号 格式。"
          }
          if (-not $env:CERTIFICATE -or
              -not $env:CERTIFICATE_PASSWORD -or
              -not $env:CERTIFICATE_PUBLISHER) {
            throw "release 环境缺少 CopyShell 代码签名密钥。"
          }
          $version = "$($Matches[1]).$($Matches[2]).$($Matches[3]).0"
          "package_version=$version" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Validate Windows PowerShell installer scripts
        shell: powershell
        run: |
          $scripts = @(
            "installer\CopyShell.Installer\install.ps1",
            "installer\CopyShell.Installer\uninstall.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Output "::error file=${script}::$($_.Message)"
              }
              throw "Windows PowerShell 5.1 could not parse $script."
            }
          }

      - name: Restore and build
        shell: pwsh
        run: |
          msbuild $env:SOLUTION `
            /m `
            /t:Restore,Build `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:ContinuousIntegrationBuild=true
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Run managed tests
        shell: pwsh
        run: |
          New-Item `
            -ItemType Directory `
            -Path "artifacts\test-results" `
            -Force | Out-Null
          $testProjects = Get-ChildItem `
            -Path "tests" `
            -Recurse `
            -Filter "*.Tests.csproj"
          foreach ($project in $testProjects) {
            dotnet test $project.FullName `
              --configuration $env:CONFIGURATION `
              --no-restore `
              --logger "trx" `
              --results-directory "artifacts\test-results"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Publish application and Shell Extension
        shell: pwsh
        run: |
          $publishRoot = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          $fullDirectory = Join-Path $publishRoot "full"
          $liteDirectory = Join-Path $publishRoot "lite"
          Remove-Item `
            -LiteralPath $publishRoot `
            -Recurse `
            -Force `
            -ErrorAction SilentlyContinue

          msbuild "src\CopyShell.App\CopyShell.App.csproj" `
            /m `
            /t:Publish `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER `
            /p:SelfContained=false `
            /p:WindowsAppSDKSelfContained=false `
            /p:PublishTrimmed=false `
            /p:PublishReadyToRun=false `
            /p:PublishSingleFile=false `
            "/p:PublishDir=$liteDirectory\"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          dotnet publish "src\CopyShell.Worker\CopyShell.Worker.csproj" `
            --configuration $env:CONFIGURATION `
            --runtime $env:RUNTIME_IDENTIFIER `
            --self-contained false `
            --output $liteDirectory
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          msbuild "src\CopyShell.App\CopyShell.App.csproj" `
            /m `
            /t:Publish `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:RuntimeIdentifier=$env:RUNTIME_IDENTIFIER `
            /p:SelfContained=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:PublishTrimmed=false `
            /p:PublishReadyToRun=false `
            /p:PublishSingleFile=false `
            "/p:PublishDir=$fullDirectory\"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          dotnet publish "src\CopyShell.Worker\CopyShell.Worker.csproj" `
            --configuration $env:CONFIGURATION `
            --runtime $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            --output $fullDirectory
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $shellOutput = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\shell\$env:RUNTIME_IDENTIFIER\"
          msbuild "src\CopyShell.ShellExtension\CopyShell.ShellExtension.vcxproj" `
            /m `
            /t:Build `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            "/p:OutDir=$shellOutput"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          foreach ($flavor in @("full", "lite")) {
            $publishDirectory = Join-Path $publishRoot $flavor
            Copy-Item `
              -LiteralPath (Join-Path $shellOutput "CopyShell.ShellExtension.dll") `
              -Destination $publishDirectory `
              -Force
            Copy-Item `
              -Path "installer\CopyShell.Installer\*.ps1" `
              -Destination $publishDirectory `
              -Force
            Copy-Item `
              -LiteralPath "LICENSE" `
              -Destination $publishDirectory `
              -Force
            Copy-Item `
              -LiteralPath "README.md" `
              -Destination $publishDirectory `
              -Force
          }

          @"
          CopyShell runtime-dependent package

          Required on the destination computer:
          - .NET 8 Runtime (x64)
          - Windows App Runtime 1.8 (x64)
          "@ | Set-Content `
            -LiteralPath (Join-Path $liteDirectory "RUNTIME-REQUIREMENTS.txt") `
            -Encoding utf8

      - name: Sign CopyShell binaries
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.COPYSHELL_SIGNING_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.COPYSHELL_SIGNING_CERT_PASSWORD }}
        run: |
          $publishRoot = "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          $fullDirectory = Join-Path $publishRoot "full"
          $liteDirectory = Join-Path $publishRoot "lite"
          & "installer\CopyShell.Identity\Sign-CopyShellArtifacts.ps1" `
            -Files @(
              (Join-Path $fullDirectory "CopyShell.App.exe"),
              (Join-Path $fullDirectory "CopyShell.Worker.exe"),
              (Join-Path $fullDirectory "CopyShell.ShellExtension.dll"),
              (Join-Path $liteDirectory "CopyShell.App.exe"),
              (Join-Path $liteDirectory "CopyShell.Worker.exe"),
              (Join-Path $liteDirectory "CopyShell.ShellExtension.dll")
            ) `
            -SigningCertificateBase64 $env:CERTIFICATE `
            -SigningCertificatePassword $env:CERTIFICATE_PASSWORD

      - name: Build signed MSIX and update manifest
        shell: pwsh
        env:
          CERTIFICATE: ${{ secrets.COPYSHELL_SIGNING_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.COPYSHELL_SIGNING_CERT_PASSWORD }}
          CERTIFICATE_PUBLISHER: ${{ secrets.COPYSHELL_CERT_PUBLISHER }}
        run: |
          $baseUri = "https://github.com/${{ github.repository }}/releases/latest/download"
          & "installer\CopyShell.Identity\New-CopyShellPackage.ps1" `
            -PublishDirectory "artifacts\publish\$env:RUNTIME_IDENTIFIER\full" `
            -ShellExtension "artifacts\publish\$env:RUNTIME_IDENTIFIER\full\CopyShell.ShellExtension.dll" `
            -OutputDirectory "artifacts\release" `
            -Version "${{ steps.version.outputs.package_version }}" `
            -Publisher $env:CERTIFICATE_PUBLISHER `
            -SigningCertificateBase64 $env:CERTIFICATE `
            -SigningCertificatePassword $env:CERTIFICATE_PASSWORD `
            -AppInstallerUri "$baseUri/CopyShell.appinstaller" `
            -PackageUri "$baseUri/CopyShell-x64.msix"

      - name: Build Portable packages and checksums
        shell: pwsh
        run: |
          $release = "artifacts\release"
          Compress-Archive `
            -Path "artifacts\publish\$env:RUNTIME_IDENTIFIER\full\*" `
            -DestinationPath (Join-Path $release "CopyShell-full-x64.zip") `
            -CompressionLevel Optimal
          Compress-Archive `
            -Path "artifacts\publish\$env:RUNTIME_IDENTIFIER\lite\*" `
            -DestinationPath (Join-Path $release "CopyShell-lite-x64.zip") `
            -CompressionLevel Optimal
          $files = @(
            (Join-Path $release "CopyShell-x64.msix"),
            (Join-Path $release "CopyShell.appinstaller"),
            (Join-Path $release "CopyShell-full-x64.zip"),
            (Join-Path $release "CopyShell-lite-x64.zip")
          )
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file).Hash.ToLowerInvariant()
            "$hash  $([IO.Path]::GetFileName($file))"
          }
          $lines | Set-Content `
            -LiteralPath (Join-Path $release "SHA256SUMS.txt") `
            -Encoding ascii

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "artifacts\release\CopyShell-x64.msix" `
            "artifacts\release\CopyShell.appinstaller" `
            "artifacts\release\CopyShell-full-x64.zip" `
            "artifacts\release\CopyShell-lite-x64.zip" `
            "artifacts\release\SHA256SUMS.txt" `
            --verify-tag `
            --generate-notes `
            --title "CopyShell ${{ github.ref_name }}"
