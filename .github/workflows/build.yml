name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION: CopyShell.sln
  CONFIGURATION: Release
  PLATFORM: x64
  RUNTIME_IDENTIFIER: win-x64
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build:
    name: Windows x64
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect solution
        id: solution
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath $env:SOLUTION) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Found $env:SOLUTION."
          }
          else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Project skeleton only: $env:SOLUTION has not been created yet."
          }

      - name: Setup .NET SDK
        if: steps.solution.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        if: steps.solution.outputs.exists == 'true'
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Validate Windows PowerShell installer scripts
        if: steps.solution.outputs.exists == 'true'
        shell: powershell
        run: |
          $scripts = @(
            "installer\CopyShell.Installer\install.ps1",
            "installer\CopyShell.Installer\uninstall.ps1"
          )
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $script),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object {
                Write-Output "::error file=${script}::$($_.Message)"
              }
              throw "Windows PowerShell 5.1 could not parse $script."
            }
          }

      - name: Restore
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          msbuild $env:SOLUTION `
            /m `
            /t:Restore `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build solution
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          msbuild $env:SOLUTION `
            /m `
            /t:Build `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:ContinuousIntegrationBuild=true
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Run managed tests
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem `
            -Path "tests" `
            -Recurse `
            -Filter "*.Tests.csproj" `
            -ErrorAction SilentlyContinue

          if (-not $testProjects) {
            Write-Host "No managed test projects found."
            exit 0
          }

          New-Item `
            -ItemType Directory `
            -Path "artifacts\test-results" `
            -Force | Out-Null

          foreach ($project in $testProjects) {
            dotnet test $project.FullName `
              --configuration $env:CONFIGURATION `
              --no-restore `
              --logger "trx" `
              --results-directory "artifacts\test-results"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Publish application
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $appProject = "src\CopyShell.App\CopyShell.App.csproj"
          if (-not (Test-Path -LiteralPath $appProject)) {
            throw "Expected application project was not found: $appProject"
          }

          dotnet publish $appProject `
            --configuration $env:CONFIGURATION `
            --runtime $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            --output "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          dotnet publish "src\CopyShell.Worker\CopyShell.Worker.csproj" `
            --configuration $env:CONFIGURATION `
            --runtime $env:RUNTIME_IDENTIFIER `
            --self-contained true `
            --output "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Collect native Shell Extension
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $shellProject = "src\CopyShell.ShellExtension\CopyShell.ShellExtension.vcxproj"
          if (-not (Test-Path -LiteralPath $shellProject)) {
            throw "Expected Shell Extension project was not found: $shellProject"
          }

          $shellOutput = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\shell\$env:RUNTIME_IDENTIFIER\"

          msbuild $shellProject `
            /m `
            /t:Build `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            "/p:OutDir=$shellOutput"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $publishDirectory = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          $extension = Join-Path $shellOutput "CopyShell.ShellExtension.dll"
          if (-not (Test-Path -LiteralPath $extension)) {
            throw "Shell Extension output was not found: $extension"
          }

          Copy-Item -LiteralPath $extension -Destination $publishDirectory -Force
          Copy-Item `
            -Path "installer\CopyShell.Installer\*.ps1" `
            -Destination $publishDirectory `
            -Force
          Copy-Item -LiteralPath "LICENSE" -Destination $publishDirectory -Force
          Copy-Item -LiteralPath "README.md" -Destination $publishDirectory -Force

      - name: Smoke test background Worker
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $worker = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\publish\$env:RUNTIME_IDENTIFIER\CopyShell.Worker.exe"
          if (-not (Test-Path -LiteralPath $worker)) {
            throw "Background Worker output was not found: $worker"
          }

          $process = Start-Process `
            -FilePath $worker `
            -ArgumentList "--health-check" `
            -Wait `
            -PassThru `
            -NoNewWindow
          $exitCode = $process.ExitCode
          $process.Dispose()
          if ($exitCode -ne 0) {
            Write-Output "::error title=Background Worker health check::Exit code $exitCode"
            throw "Background Worker health check failed: $exitCode"
          }

      - name: Smoke test application startup
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $application = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\publish\$env:RUNTIME_IDENTIFIER\CopyShell.App.exe"
          if (-not (Test-Path -LiteralPath $application)) {
            throw "Application output was not found: $application"
          }

          $startInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $startInfo.FileName = $application
          $startInfo.WorkingDirectory = Split-Path -Parent $application
          $startInfo.UseShellExecute = $false
          $startInfo.ArgumentList.Add("--health-check")
          $process = [System.Diagnostics.Process]::Start($startInfo)
          if (-not $process.WaitForExit(20000)) {
            $process.Kill($true)
            $process.Dispose()
            throw "Application health check timed out."
          }

          $exitCode = $process.ExitCode
          $process.Dispose()
          if ($exitCode -ne 0) {
            $log = Join-Path `
              $env:LOCALAPPDATA `
              "CopyShell\Logs\App\$([DateTimeOffset]::UtcNow.ToString('yyyy-MM')).log"
            if (Test-Path -LiteralPath $log) {
              $diagnostics = Get-Content -LiteralPath $log -Raw
              $annotation = $diagnostics `
                -replace "%", "%25" `
                -replace "`r", "%0D" `
                -replace "`n", "%0A"
              Write-Output "::error title=Application health check::$annotation"
            }
            throw "Application health check failed: $exitCode"
          }

      - name: Smoke test Shell Extension
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          $extension = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\publish\$env:RUNTIME_IDENTIFIER\CopyShell.ShellExtension.dll"

          function Stop-SmokeTest([string]$Message) {
            Write-Output "::error title=Shell Extension smoke test::$Message"
            throw $Message
          }

          function Invoke-RegSvr32([bool]$Unregister) {
            $regsvr32 = Join-Path $env:SystemRoot "System32\regsvr32.exe"
            $startInfo = [System.Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $regsvr32
            $startInfo.UseShellExecute = $false
            $startInfo.ArgumentList.Add("/s")
            if ($Unregister) {
              $startInfo.ArgumentList.Add("/u")
            }
            $startInfo.ArgumentList.Add($extension)

            $process = [System.Diagnostics.Process]::Start($startInfo)
            $process.WaitForExit()
            $exitCode = $process.ExitCode
            $process.Dispose()
            return $exitCode
          }

          Add-Type @"
          using System;
          using System.Runtime.InteropServices;

          public static class CopyShellNativeTest
          {
              [DllImport("kernel32.dll", CharSet = CharSet.Unicode, SetLastError = true)]
              public static extern IntPtr LoadLibrary(string path);

              [DllImport("kernel32.dll", CharSet = CharSet.Ansi, SetLastError = true)]
              public static extern IntPtr GetProcAddress(IntPtr module, string name);

              [DllImport("kernel32.dll")]
              public static extern bool FreeLibrary(IntPtr module);
          }
          "@

          $module = [CopyShellNativeTest]::LoadLibrary($extension)
          if ($module -eq [IntPtr]::Zero) {
            $errorCode = [Runtime.InteropServices.Marshal]::GetLastWin32Error()
            Stop-SmokeTest "Shell Extension could not be loaded. Win32 error: $errorCode"
          }

          try {
            $exports = @(
              "DllCanUnloadNow",
              "DllGetClassObject",
              "DllRegisterServer",
              "DllUnregisterServer"
            )
            foreach ($name in $exports) {
              if ([CopyShellNativeTest]::GetProcAddress($module, $name) -eq [IntPtr]::Zero) {
                Stop-SmokeTest "Missing Shell Extension export: $name"
              }
            }
          }
          finally {
            [CopyShellNativeTest]::FreeLibrary($module) | Out-Null
          }

          $registerExitCode = Invoke-RegSvr32 $false
          if ($registerExitCode -ne 0) {
            Stop-SmokeTest "Shell Extension registration failed: $registerExitCode"
          }

          try {
            $classKey = "Registry::HKEY_CURRENT_USER\Software\Classes\CLSID\{6D5FE7D6-4A85-4ED1-AF8A-4E6F338C3D71}\InprocServer32"
            $handlerKey = "Registry::HKEY_CURRENT_USER\Software\Classes\*\shellex\ContextMenuHandlers\CopyShell"
            if (-not (Test-Path -LiteralPath $classKey) -or
                -not (Test-Path -LiteralPath $handlerKey)) {
              Stop-SmokeTest "Current-user Shell Extension registry keys were not created."
            }

            $registeredPath = (Get-Item -LiteralPath $classKey).GetValue("")
            if ($registeredPath -ne $extension) {
              Stop-SmokeTest "Registered Shell Extension path is incorrect: $registeredPath"
            }
          }
          finally {
            $unregisterExitCode = Invoke-RegSvr32 $true
            if ($unregisterExitCode -ne 0) {
              Stop-SmokeTest "Shell Extension cleanup failed: $unregisterExitCode"
            }
          }

      - name: Smoke test current-user installer
        if: steps.solution.outputs.exists == 'true'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $publishDirectory = Join-Path `
            $env:GITHUB_WORKSPACE `
            "artifacts\publish\$env:RUNTIME_IDENTIFIER"
          $installScript = Join-Path $publishDirectory "install.ps1"
          $uninstallScript = Join-Path $publishDirectory "uninstall.ps1"
          $classKey = "Registry::HKEY_CURRENT_USER\Software\Classes\CLSID\{6D5FE7D6-4A85-4ED1-AF8A-4E6F338C3D71}\InprocServer32"
          $installRoot = Join-Path $env:LOCALAPPDATA "Programs\CopyShell"

          try {
            & $installScript -SourceDirectory $publishDirectory

            if (-not (Test-Path -LiteralPath $classKey)) {
              throw "The installer did not register the Shell Extension."
            }

            $registeredPath = (Get-Item -LiteralPath $classKey).GetValue("")
            if (-not $registeredPath.StartsWith(
              $installRoot,
              [StringComparison]::OrdinalIgnoreCase
            )) {
              throw "The installer registered an unexpected path: $registeredPath"
            }
            if (-not (Test-Path -LiteralPath $registeredPath)) {
              throw "The registered Shell Extension does not exist: $registeredPath"
            }
          }
          finally {
            & $uninstallScript
          }

          if (Test-Path -LiteralPath $classKey) {
            throw "The uninstaller did not remove the Shell Extension registration."
          }

      - name: Build unsigned MSIX for validation
        if: steps.solution.outputs.exists == 'true'
        shell: pwsh
        run: |
          try {
            $revision = [int]("${{ github.run_number }}") % 65535
            & "installer\CopyShell.Identity\New-CopyShellPackage.ps1" `
              -PublishDirectory "artifacts\publish\$env:RUNTIME_IDENTIFIER" `
              -ShellExtension "artifacts\publish\$env:RUNTIME_IDENTIFIER\CopyShell.ShellExtension.dll" `
              -OutputDirectory "artifacts\package" `
              -Version "0.2.0.$revision" `
              -Publisher "CN=CopyShell Development"
          }
          catch {
            $message = $_.Exception.Message.Replace("`r", " ").Replace("`n", " ")
            Write-Output "::error title=MSIX validation::$message"
            throw
          }

      - name: Upload build artifacts
        if: steps.solution.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: CopyShell-${{ env.RUNTIME_IDENTIFIER }}
          path: |
            artifacts/publish/${{ env.RUNTIME_IDENTIFIER }}/
            artifacts/package/CopyShell-x64.msix
          if-no-files-found: error
          retention-days: 14
